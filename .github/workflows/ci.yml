name: OmegaBot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       omegabot_test
          POSTGRES_USER:     omegabot
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        working-directory: apps/api
        run: |
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Run unit tests
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL:    redis://localhost:6379/15
          SECRET_KEY:   ci-test-secret-key
          DEBUG:        "true"
        run: pytest tests/test_mock_broker.py tests/test_backtest_engine.py tests/test_dsl_evaluator.py tests/test_strategies.py tests/test_execution.py -v --tb=short

      - name: Run integration tests
        working-directory: apps/api
        env:
          DATABASE_URL:  postgresql+asyncpg://omegabot:test_password@localhost:5432/omegabot_test
          REDIS_URL:     redis://localhost:6379/15
          SECRET_KEY:    ci-test-secret-key
          DEBUG:         "true"
          POSTGRES_HOST: localhost
        run: |
          alembic upgrade head
          pytest tests/test_integration.py -v --tb=short -m integration
        continue-on-error: true  # Integration tests require full stack

      - name: Lint with ruff
        working-directory: apps/api
        run: ruff check app/ --select=E,F,W --ignore=E501

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/web
        run: npx next lint --max-warnings 0
        continue-on-error: true

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL:  ws://localhost:8000
        run: npm run build

  # ─── Docker Build Check ─────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile.prod -t omegabot-api apps/api

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile.prod -t omegabot-web apps/web
