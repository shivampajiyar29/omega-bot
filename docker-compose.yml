# OmegaBot — Root docker-compose.yml
# Runs the complete stack locally.
# Usage: docker compose up --build
# Dashboard: http://localhost:13000
# API Docs:  http://localhost:18000/docs
# Health:    http://localhost:18000/health

version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omegabot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-omegabot}
      POSTGRES_USER:     ${POSTGRES_USER:-omegabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omegabot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omegabot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omegabot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-omegabot}:${POSTGRES_PASSWORD:-omegabot_secret}@postgres:5432/${POSTGRES_DB:-omegabot}
      REDIS_URL:           redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CELERY_BROKER_URL:   redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      CORS_ORIGINS:        '["http://localhost:13000","http://localhost:3000","http://127.0.0.1:13000"]'
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-omegabot}:${POSTGRES_PASSWORD:-omegabot_secret}@postgres:5432/${POSTGRES_DB:-omegabot}
      REDIS_URL:           redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CELERY_BROKER_URL:   redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - api

  # ─── Celery Beat (scheduler) ──────────────────────────────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-omegabot}:${POSTGRES_PASSWORD:-omegabot_secret}@postgres:5432/${POSTGRES_DB:-omegabot}
      REDIS_URL:           redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      CELERY_BROKER_URL:   redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
    command: celery -A app.worker.celery_app.celery_app beat --loglevel=info
    depends_on:
      - redis

  # ─── AI Engine (optional ML service) ─────────────────────────────────────
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: omegabot_ai_engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ai_models:/app/ai_engine/models/saved
    environment:
      BUY_THRESHOLD:  "0.62"
      SELL_THRESHOLD: "0.62"
    profiles:
      - ai      # start with: docker compose --profile ai up
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL:  http://localhost:18000
        NEXT_PUBLIC_WS_URL:   ws://localhost:18000
    container_name: omegabot_web
    restart: unless-stopped
    ports:
      - "13000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18000
      NEXT_PUBLIC_WS_URL:  ws://localhost:18000

volumes:
  postgres_data:
  redis_data:
  ai_models:
