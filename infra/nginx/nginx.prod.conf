user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Rate limiting — protect the API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/m;

    # Logging
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    # ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Main HTTPS server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;  # Replace with your domain

        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN";
        add_header X-Content-Type-Options   "nosniff";
        add_header X-XSS-Protection         "1; mode=block";
        add_header Referrer-Policy          "strict-origin-when-cross-origin";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # Long-lived WebSocket connections
        location /api/v1/ws/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
        }

        # ─── API (REST + other /api/) ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ─── Webhook endpoints (stricter rate limit) ──────────────────────────
        location /api/v1/webhooks/ {
            limit_req zone=webhook_limit burst=5 nodelay;
            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 30s;
        }

        # WebSocket feeds are under /api/v1/ws/ (proxied via location /api/ above).

        # ─── API Docs (restrict in production) ───────────────────────────────
        location /docs {
            # Uncomment to restrict access:
            # allow 1.2.3.4;  # your IP
            # deny all;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }

        # ─── Static Next.js assets ────────────────────────────────────────────
        location /_next/static/ {
            proxy_pass          http://web:3000;
            proxy_cache_valid   200 1d;
            expires             1d;
            add_header          Cache-Control "public, immutable";
        }

        # ─── Frontend ─────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://web:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
