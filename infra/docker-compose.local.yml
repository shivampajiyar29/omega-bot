# Local / dev stack: Postgres + Redis + API + Web (no TLS nginx).
# Run from repo root (omegabot/):
#   set POSTGRES_PASSWORD=... REDIS_PASSWORD=...  (PowerShell: $env:POSTGRES_PASSWORD="...")
#   docker compose -f infra/docker-compose.local.yml --env-file .env up --build
#
# Dashboard: http://localhost:3000
# API docs:  http://localhost:8000/docs
#
# Data: named volumes postgres_data, redis_data (same pattern as prod).









version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: omegabot_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omegabot}
      POSTGRES_USER: ${POSTGRES_USER:-omegabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omegabot_redis_local
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data_local:/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_api_local
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      CORS_ORIGINS: "[\"http://localhost:3000\",\"http://127.0.0.1:3000\",\"http://localhost:13000\",\"http://127.0.0.1:13000\"]"
      AI_PROVIDER: ${AI_PROVIDER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "18000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_worker_local
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      AI_PROVIDER: ${AI_PROVIDER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - api

  beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_beat_local
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    command: celery -A app.worker.celery_app.celery_app beat --loglevel=info
    depends_on:
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${LOCAL_API_URL:-http://localhost:18000}
        NEXT_PUBLIC_WS_URL: ${LOCAL_WS_URL:-ws://localhost:18000}
    container_name: omegabot_web_local
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-13000}:3000"
    depends_on:
      - api

volumes:
  postgres_data_local:
  redis_data_local: