version: "3.9"
# Production docker-compose — optimized images, no volume mounts, restart policies
# Usage: docker compose -f infra/docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: omegabot_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-omegabot}
      POSTGRES_USER:     ${POSTGRES_USER:-omegabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omegabot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: omegabot_timescale
    restart: always
    environment:
      POSTGRES_DB:       ${TIMESCALE_DB:-omegabot_ts}
      POSTGRES_USER:     ${TIMESCALE_USER:-omegabot}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-omegabot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omegabot_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    container_name: omegabot_api
    restart: always
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TIMESCALE_URL: postgresql+asyncpg://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/${TIMESCALE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
    networks: [internal, web]
    deploy:
      resources:
        limits:
          memory: 512M

  # Celery worker removed: no celery app or celery dependency in apps/api yet.

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.prod
      args:
        # Baked into the Next.js client bundle at build time — must be reachable from the browser.
        # Example behind nginx TLS: PUBLIC_SITE_URL=https://your-domain.com  PUBLIC_WS_URL=wss://your-domain.com
        NEXT_PUBLIC_API_URL: ${PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost}
    container_name: omegabot_web
    restart: always
    depends_on: [api]
    networks: [internal, web]
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: omegabot_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on: [web, api]
    networks: [web]

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  nginx_cache:

networks:
  internal:
    driver: bridge
    internal: true     # No outbound internet from DB/Redis
  web:
    driver: bridge
